name: RSS to Notion
on:
  schedule:
    # 这里的 cron 格式为：分钟 小时 天 月 星期
    # 注意：GitHub Actions 的时间是 UTC 时间（格林威治标准时间）
    # 北京时间 23:00 等于 UTC 时间 15:00
    - cron: '0 15 * * 1'
  workflow_dispatch: # 保留这个，以便你随时可以手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    # 关键：赋予写入权限
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Run Sync Script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          RSS_URL: ${{ secrets.RSS_URL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          mkdir -p images  # 创建存放图片的文件夹
          python sync.py

      - name: Commit and Push images
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add images/*
          git commit -m "Backup images from RSS" || exit 0 # 如果没有新图片就跳过
          git push
